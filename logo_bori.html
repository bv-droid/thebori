<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BØRI — Logo System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@200;300&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #080808;
    display: flex; align-items: center; justify-content: center;
    overflow-x: hidden; overflow-y: auto;
    font-family: 'Libre Franklin', sans-serif;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.3; pointer-events: none; z-index: 10;
  }

  .page {
    display: flex; flex-direction: column; align-items: center;
    gap: 48px; padding: 48px 24px 80px; width: 100%;
  }

  .logo-main {
    width: min(82vw, 440px); position: relative;
    opacity: 0; animation: reveal 1.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
  }
  .logo-main svg { width: 100%; height: auto; display: block; }
  .logo-main::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.1) 48%, rgba(255,255,255,0.05) 52%, transparent 70%);
    background-size: 300% 100%; background-position: 150% 0;
    animation: shimmer 0.7s cubic-bezier(0.4,0,0.2,1) 2s forwards;
    pointer-events: none; mix-blend-mode: overlay;
  }
  @keyframes reveal {
    from { opacity: 0; transform: scale(0.94) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes shimmer {
    from { background-position: 150% 0; }
    to   { background-position: -50% 0; }
  }

  .divider {
    width: 0; height: 1px;
    background: linear-gradient(90deg, transparent, #8B6914, transparent);
    opacity: 0; animation: lineGrow 0.8s ease-out 2.2s forwards;
  }
  @keyframes lineGrow {
    to { width: min(50vw, 280px); opacity: 0.4; }
  }

  .tagline {
    font-weight: 200; letter-spacing: 0.5em; font-size: clamp(9px,1.3vw,11px);
    color: rgba(139,105,20,0.4); text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.8s ease-out 2.5s forwards;
  }
  .meta {
    display: flex; align-items: center; gap: 18px;
    opacity: 0; animation: fadeUp 0.8s ease-out 2.8s forwards;
  }
  .meta span { font-family: 'Cormorant Garamond', serif; font-style: italic; font-weight: 300; font-size: 11px; color: rgba(139,105,20,0.3); letter-spacing: 0.2em; }
  .meta .dot { width: 2px; height: 2px; border-radius: 50%; background: rgba(139,105,20,0.25); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.7; transform: translateY(0); }
  }

  .section-label {
    font-weight: 200; letter-spacing: 0.4em; font-size: 9px;
    color: rgba(255,255,255,0.15); text-transform: uppercase;
    opacity: 0; animation: fadeUp 0.8s ease-out 3s forwards;
  }
  .variants {
    display: flex; gap: 36px; flex-wrap: wrap; justify-content: center;
    opacity: 0; animation: fadeUp 1s ease-out 3.2s forwards;
  }
  .variant { text-align: center; }
  .variant svg { width: 130px; height: auto; display: block; margin-bottom: 8px; transition: filter 0.3s; }
  .variant:hover svg { filter: drop-shadow(0 0 16px rgba(255,255,255,0.04)); }
  .variant-name { font-weight: 300; font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(255,255,255,0.18); }

  @media (max-width: 600px) {
    .variants { gap: 16px; }
    .variant svg { width: 80px; }
  }
</style>
</head>
